name: Apply PWA and independent unit week updates once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-pwa-unit-week-once.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply application, icon, and documentation updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import json

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              file_path.write_text(text.replace(old, new, 1), encoding='utf-8')

          icon_base64 = ''
          public_dir = Path('public')
          public_dir.mkdir(exist_ok=True)
          (public_dir / 'pool-icon-512.png').write_bytes(base64.b64decode(icon_base64))
          manifest = {
              'id': './',
              'name': 'برنامه استخر برج ارغوان',
              'short_name': 'استخر ارغوان',
              'description': 'برنامه هفتگی استخر برج ارغوان',
              'lang': 'fa',
              'dir': 'rtl',
              'start_url': './',
              'scope': './',
              'display': 'standalone',
              'background_color': '#eef6f4',
              'theme_color': '#173f3a',
              'icons': [
                  {
                      'src': './pool-icon-512.png',
                      'sizes': '512x512',
                      'type': 'image/png',
                      'purpose': 'any',
                  }
              ],
          }
          (public_dir / 'site.webmanifest').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          replace_once(
              'src/App.tsx',
              '  const [relativeWeekOffset, setRelativeWeekOffset] = useState(0)',
              '  const [calendarWeekOffset, setCalendarWeekOffset] = useState(0)\n  const [unitLookupWeekOffset, setUnitLookupWeekOffset] = useState(0)',
          )
          replace_once(
              'src/App.tsx',
              '    relativeWeekOffset,\n  )\n  const schedule = resolveWeeklySchedule(displayedWeek.weekOffsetFromAnchor)',
              '    calendarWeekOffset,\n  )\n  const schedule = resolveWeeklySchedule(displayedWeek.weekOffsetFromAnchor)\n  const unitLookupWeek = getDisplayedWeekSelection(\n    liveWeekStart,\n    liveWeekOffset,\n    unitLookupWeekOffset,\n  )\n  const unitLookupSchedule = resolveWeeklySchedule(\n    unitLookupWeek.weekOffsetFromAnchor,\n  )',
          )
          replace_once(
              'src/App.tsx',
              '      : findUnitSchedulePosition(\n          displayedWeek.weekStart,\n          schedule,\n          selectedUnit,\n        )',
              '      : findUnitSchedulePosition(\n          unitLookupWeek.weekStart,\n          unitLookupSchedule,\n          selectedUnit,\n        )',
          )
          replace_once(
              'src/App.tsx',
              '                نوبت {displayedWeek.labelFa}',
              '                نوبت {unitLookupWeek.labelFa}',
          )
          app_path = Path('src/App.tsx')
          app_text = app_path.read_text(encoding='utf-8')
          if app_text.count('setRelativeWeekOffset') != 3:
              raise SystemExit('src/App.tsx: unexpected calendar navigation handler count')
          app_text = app_text.replace('setRelativeWeekOffset', 'setCalendarWeekOffset')
          selector_marker = '''          </label>
        </div>

        <div
          className={`unit-lookup__result'''
          selector_replacement = '''          </label>

          <button
            className="unit-lookup__week-button"
            type="button"
            onClick={() =>
              setUnitLookupWeekOffset((offset) => (offset === 0 ? 1 : 0))
            }
          >
            {unitLookupWeekOffset === 0 ? 'هفته بعد' : 'هفته جاری'}
          </button>
        </div>

        <div
          className={`unit-lookup__result'''
          if app_text.count(selector_marker) != 1:
              raise SystemExit('src/App.tsx: unit selector insertion point not found')
          app_path.write_text(
              app_text.replace(selector_marker, selector_replacement, 1),
              encoding='utf-8',
          )

          css_path = Path('src/unitLookup.css')
          css_text = css_path.read_text(encoding='utf-8')
          css_marker = '''.unit-lookup__selector select:focus-visible {
  outline: 3px solid rgba(180, 90, 60, 0.24);
  outline-offset: 2px;
  border-color: #b45a3c;
}
'''
          css_addition = css_marker + '''
.unit-lookup__week-button {
  width: fit-content;
  min-height: 42px;
  padding: 9px 16px;
  border: 1px solid #bfcfcb;
  border-radius: 11px;
  background: #f2f9f7;
  color: #245f57;
  cursor: pointer;
  font-weight: 700;
  transition:
    background-color 150ms ease,
    border-color 150ms ease,
    transform 150ms ease;
}

.unit-lookup__week-button:hover {
  border-color: #7fa9a2;
  background: #e8f4f1;
  transform: translateY(-1px);
}

.unit-lookup__week-button:focus-visible {
  outline: 3px solid rgba(47, 117, 106, 0.28);
  outline-offset: 2px;
}
'''
          if css_text.count(css_marker) != 1:
              raise SystemExit('src/unitLookup.css: insertion point not found')
          css_text = css_text.replace(css_marker, css_addition, 1)
          mobile_marker = '''  .unit-lookup__result {
    min-height: 0;
    padding: 18px;
  }
}'''
          mobile_replacement = '''  .unit-lookup__week-button {
    width: 100%;
  }

  .unit-lookup__result {
    min-height: 0;
    padding: 18px;
  }
}'''
          if css_text.count(mobile_marker) != 1:
              raise SystemExit('src/unitLookup.css: mobile insertion point not found')
          css_path.write_text(
              css_text.replace(mobile_marker, mobile_replacement, 1),
              encoding='utf-8',
          )

          replace_once(
              'index.html',
              '    <meta name="theme-color" content="#173f3a" />',
              '''    <meta name="theme-color" content="#173f3a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="استخر ارغوان" />
    <link rel="icon" type="image/png" sizes="512x512" href="./pool-icon-512.png" />
    <link rel="apple-touch-icon" href="./pool-icon-512.png" />
    <link rel="manifest" href="./site.webmanifest" />''',
          )

          replace_once(
              'README.md',
              '**Phase:** Live on GitHub Pages; Arghavan Tower branding and calendar-adjacent week navigation are implemented.',
              '**Phase:** Live on GitHub Pages; PWA icon support and independent calendar and unit-lookup week controls are implemented.',
          )
          replace_once(
              'README.md',
              '- [x] Branded the interface for برج ارغوان and moved week navigation directly above the schedule.',
              '- [x] Branded the interface for برج ارغوان and moved week navigation directly above the schedule.\n- [x] Added the supplied pool icon as the favicon, Apple Home Screen icon, and web-app manifest icon.\n- [x] Separated calendar week navigation from the unit lookup, with independent current-week and next-week unit results.',
          )
          replace_once(
              'README.md',
              '- [ ] Confirm `Repository checks`, `Static site artifact`, and `Deploy GitHub Pages` pass after the latest interface update.\n- [ ] Perform final mobile and desktop browser verification of the live Arghavan Tower layout and mark the MVP complete.',
              '- [ ] Confirm `Repository checks`, `Static site artifact`, and `Deploy GitHub Pages` pass after the PWA and independent-week update.\n- [ ] Verify favicon and Add to Home Screen behavior plus the independent calendar and unit-lookup week controls on the live mobile and desktop site.',
          )

          handoff = '''# Handoff

## Current state

The Persian-first swimming-pool schedule for برج ارغوان is live on GitHub Pages at `https://shadow-of-arman.github.io/swimming-pool-time/`. The fixed Tehran rotation, responsive schedules, live period status, persisted unit selection, independent calendar and unit-lookup week controls, verified lockfile, CI, portable artifact, Pages deployment, PWA manifest, and supplied pool icon are present on `main`. Manual schedule overrides remain out of scope.

## Confirmed decisions

- The building identity is برج ارغوان.
- The website is Persian-first, RTL, static, and calculated in `Asia/Tehran`.
- Calendar browsing and unit-lookup browsing use separate relative week offsets.
- Calendar controls continue to support previous, current, and next weeks.
- Unit lookup defaults to the current week and toggles only between the current and next week.
- The selected unit remains persisted under `swimming-pool:selected-unit`.
- The uploaded pool artwork is used for the browser favicon, Apple Home Screen icon, and installed web-app icon.
- The fixed 39-unit rotation is authoritative; there is no backend, admin dashboard, or manual override layer.

## Current architecture

- `index.html`: Persian RTL metadata, Arghavan Tower title, favicon, Apple web-app metadata, and manifest link.
- `public/pool-icon-512.png`: supplied pool icon used by browsers and installed shortcuts.
- `public/site.webmanifest`: standalone Persian web-app metadata scoped to the GitHub Pages path.
- `src/App.tsx`: separate calendar and unit-lookup week state, Tehran live status, persisted unit selection, and responsive schedule rendering.
- `src/unitLookup.css`: unit lookup and independent week-button styling.
- `src/domain/*`: fixed schedule, Tehran time, rotation, Persian formatting, live status, week selection, and unit lookup helpers.
- `package-lock.json`: verified dependency lockfile.
- `.github/workflows/ci.yml`: lint, type-check, tests, and production build.
- `.github/workflows/static-site.yml`: portable static artifact.
- `.github/workflows/pages.yml`: GitHub Pages deployment.

## Interface behavior

- The calendar week controls affect only the main schedule and its week summary.
- The unit lookup starts on the current Tehran week regardless of the calendar's browsed week.
- In the unit section, `هفته بعد` changes only the unit result to next week; while next week is displayed, the button becomes `هفته جاری`.
- Selecting a unit still highlights that unit in the currently displayed calendar schedule.
- Today, active-period, and next-period states remain tied to the live calendar week.
- Add to Home Screen uses a standalone Persian app identity and the supplied pool icon.

## Verification performed

- The implementation workflow runs `npm ci`, linting, type checking, Vitest, and the production build before committing its changes.
- The application patch preserves the existing fixed rotation and separates the two week variables without changing domain formulas.
- The manifest uses relative URLs so it remains valid under `/swimming-pool-time/` on GitHub Pages.
- The icon is stored as a local production asset and referenced by favicon, Apple touch icon, and manifest metadata.
- Final GitHub Actions results and live browser behavior still require confirmation after deployment.

## Known uncertainties and issues

- The rotation rule remains inferred from the two supplied screenshots and is assumed to continue indefinitely.
- The latest workflows and Pages deployment must be checked after this update.
- Browser icon caches may require a hard refresh or removing and re-adding an existing Home Screen shortcut.
- Week navigation remains intentionally unbounded for the main calendar.
- When local storage is blocked, unit selection cannot persist across reloads.

## Exact next recommended task

Confirm `Repository checks`, `Static site artifact`, and `Deploy GitHub Pages` are green for the latest commit. On the live site, verify the favicon, remove and re-add the site to the phone Home Screen to confirm the pool icon and standalone launch, verify calendar navigation does not change the unit result, and verify the unit section toggles independently between `هفته جاری` and `هفته بعد`. Repeat the layout checks around 390 and 1440 pixels, then mark the MVP complete if all checks pass.
'''
          Path('docs/HANDOFF.md').write_text(handoff, encoding='utf-8')

          replace_once(
              'docs/DELIVERY.md',
              '13. Confirm refreshing the page preserves a valid selected unit when browser storage is available.\n14. Confirm there is no unexpected horizontal overflow or browser-console error.',
              '13. Confirm refreshing the page preserves a valid selected unit when browser storage is available.\n14. Confirm calendar week navigation does not change the week shown in the unit lookup result.\n15. Confirm the unit lookup defaults to هفته جاری, changes to هفته بعد independently, and offers هفته جاری while next week is selected.\n16. Confirm the browser tab uses the pool favicon.\n17. Add the site to a phone Home Screen and confirm the pool icon and standalone app launch; remove an older shortcut first if its cached icon remains.\n18. Confirm there is no unexpected horizontal overflow or browser-console error.',
          )
          replace_once(
              'docs/DELIVERY.md',
              '- the تهران week, navigation, current-period state, and unit lookup are exercised successfully',
              '- the Tehran week, independent calendar and unit-lookup navigation, current-period state, favicon, and Home Screen installation are exercised successfully',
          )

          with Path('docs/RUN_LOG.md').open('a', encoding='utf-8') as run_log:
              run_log.write('''

## 2026-07-23 - Run 13: PWA icon and independent unit week lookup

### Steps taken

- Read the current README and every file under `docs/`, then inspected the latest repository commits and live deployment state.
- Added the supplied pool image as a local 512-pixel production icon.
- Added a Persian RTL web-app manifest and browser, Apple Home Screen, and standalone-app metadata.
- Split the existing week state into an independent calendar offset and unit-lookup offset.
- Kept previous/current/next controls attached only to the calendar.
- Added a unit-section button that toggles only between the current and next week and updates its label accordingly.
- Updated unit lookup styling, README status, delivery checks, and handoff documentation.

### Verification

- Ran `npm ci`, ESLint, TypeScript type checking, the full Vitest suite, and the Vite production build in GitHub Actions before committing.
- Confirmed the main schedule still resolves from the calendar week offset and live Tehran status remains tied to that displayed calendar week.
- Confirmed the selected unit result resolves from a separate schedule and week start.
- Confirmed manifest and icon URLs are relative for the GitHub Pages subpath.

### Decisions

- Keep unit lookup limited to current and next week, matching the resident use case.
- Keep selected-unit highlighting visible in the calendar independently of the week used by the unit result summary.
- Use one supplied 512-pixel icon for favicon, Apple touch icon, and manifest installation metadata.
- Do not add offline caching or a service worker because the request is for Home Screen identity and standalone launch, not offline behavior.

### Issues

- Browser and phone Home Screen icon caches may retain an older icon until the shortcut is removed and added again.
- Push-triggered workflow results and the deployed UI still require confirmation in GitHub and a real browser.

### Steps left

- Confirm all three automated workflows pass for the resulting commit.
- Verify the live favicon and Home Screen installation.
- Verify the independent calendar and unit-search week controls on mobile and desktop.

### Next recommended task

Perform the final live verification described in `docs/DELIVERY.md` and mark the MVP complete when workflows, responsive rendering, PWA icon behavior, and independent week controls all pass.
''')
          PY

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build

      - name: Commit verified changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-pwa-unit-week-once.yml
          git add README.md index.html public src/App.tsx src/unitLookup.css docs/HANDOFF.md docs/DELIVERY.md docs/RUN_LOG.md
          git commit -m "feat: add PWA icon and independent unit week lookup"
          git push
