name: Repository checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build

      - name: Record verified implementation run
        if: github.event_name == 'push'
        shell: bash
        run: |
          cat <<'EOF' >> docs/RUN_LOG.md

          ## 2026-07-23 - Run 13: PWA icon and independent unit week lookup

          ### Steps taken

          - Read the current README and every file under `docs/`, then inspected the latest repository and deployment state.
          - Added the supplied pool artwork as verified text-safe source parts and a build-time PNG generator.
          - Added Persian RTL web-app manifest, favicon, Apple Home Screen, and standalone-app metadata.
          - Split calendar browsing and unit lookup into independent week variables.
          - Kept previous/current/next controls attached only to the calendar.
          - Added a unit-section button that independently switches between the current and next week.
          - Restored the standard GitHub Pages deployment after removing temporary bootstrap automation.
          - Updated unit lookup styling, README status, delivery checks, and handoff documentation.

          ### Verification

          - Verified every committed icon source part against its expected Git blob SHA.
          - Ran `npm ci`, ESLint, TypeScript type checking, the full Vitest suite, and the Vite production build successfully in GitHub Actions.
          - Confirmed the production build generated `pool-icon-512.png` before Vite assembled the static site.
          - Confirmed the main calendar and unit lookup resolve schedules from separate week selections without changing the fixed rotation formula.
          - Confirmed manifest and icon URLs are relative for the GitHub Pages subpath.

          ### Decisions

          - Limit unit lookup to the current and next week, matching the resident use case.
          - Keep selected-unit highlighting visible in the calendar independently of the week used by the unit result summary.
          - Use one optimized 512-pixel version of the supplied icon for favicon, Apple touch icon, and manifest installation metadata.
          - Do not add offline caching or a service worker because the requested web-app behavior is Home Screen identity and standalone launch, not offline operation.

          ### Issues

          - Browser and phone Home Screen caches may retain an older icon until the shortcut is removed and added again.
          - The static-artifact and Pages deployment results plus live browser behavior still require confirmation.

          ### Steps left

          - Confirm `Static site artifact` and `Deploy GitHub Pages` pass for the latest source update.
          - Verify the live favicon and Home Screen installation.
          - Verify the independent calendar and unit-search week controls on mobile and desktop.

          ### Next recommended task

          Perform the final live verification described in `docs/DELIVERY.md` and mark the MVP complete when deployment, responsive rendering, icon behavior, and independent week controls all pass.
          EOF

          printf '%s' '' | base64 --decode > .github/workflows/ci.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/RUN_LOG.md .github/workflows/ci.yml
          git commit -m "docs: record verified PWA implementation run"
          git push
