name: Apply Arghavan Tower customization once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/customize-arghavan-once.yml

permissions:
  contents: write

jobs:
  customize:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply interface updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              file_path.write_text(text.replace(old, new, 1), encoding='utf-8')

          app_path = Path('src/App.tsx')
          app = app_path.read_text(encoding='utf-8')
          navigation_pattern = re.compile(
              r'      <nav className="week-navigation" aria-label="جابجایی بین هفته‌ها">.*?      </nav>\n\n',
              re.DOTALL,
          )
          navigation_match = navigation_pattern.search(app)
          if navigation_match is None:
              raise SystemExit('src/App.tsx: week navigation block not found')
          navigation = navigation_match.group(0).rstrip()
          app = navigation_pattern.sub('', app, count=1)

          schedule_marker = '      </ul>\n\n      <section className="mobile-schedule"'
          if app.count(schedule_marker) != 1:
              raise SystemExit('src/App.tsx: schedule insertion marker mismatch')
          app = app.replace(
              schedule_marker,
              '      </ul>\n\n' + navigation + '\n\n      <section className="mobile-schedule"',
              1,
          )

          old_eyebrow = '<p className="eyebrow">استخر ساختمان</p>'
          if app.count(old_eyebrow) != 1:
              raise SystemExit('src/App.tsx: building eyebrow mismatch')
          app = app.replace(
              old_eyebrow,
              '<p className="eyebrow">برج ارغوان</p>',
              1,
          )
          app_path.write_text(app, encoding='utf-8')

          replace_once(
              'index.html',
              'content="برنامه هفتگی و خودکار استخر ساختمان"',
              'content="برنامه هفتگی و خودکار استخر برج ارغوان"',
          )
          replace_once(
              'index.html',
              '<title>برنامه هفتگی استخر</title>',
              '<title>برنامه استخر برج ارغوان</title>',
          )
          replace_once(
              'src/navigation.css',
              '  margin: 0 0 18px;',
              '  margin: 0 0 12px;',
          )
          replace_once(
              '.github/workflows/static-site.yml',
              'run: npm install --no-audit --no-fund',
              'run: npm ci --no-audit --no-fund',
          )

          Path('.github/workflows/customize-arghavan-once.yml').unlink()
          PY

      - name: Commit customization
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: brand schedule for Arghavan Tower"
          git push
